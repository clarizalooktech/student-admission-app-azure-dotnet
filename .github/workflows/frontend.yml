name: Frontend — build & deploy to Azure Blob Storage

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

env:
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:
  deploy-frontend:
    name: Deploy frontend to Blob Storage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Write backend URL into config.json
        run: |
          echo '{ "apiBase": "${{ secrets.BACKEND_URL }}" }' > frontend/config.json

      - name: Ensure storage account exists
        run: |
          EXISTS=$(az storage account show \
            --name stadmissionfrontend \
            --resource-group ${{ secrets.TF_VAR_RESOURCE_GROUP_NAME }} \
            --query name -o tsv 2>/dev/null || echo "NotFound")

          if [ "$EXISTS" = "NotFound" ]; then
            echo "Creating storage account..."
            az storage account create \
              --name stadmissionfrontend \
              --resource-group ${{ secrets.TF_VAR_RESOURCE_GROUP_NAME }} \
              --location australiaeast \
              --sku Standard_LRS \
              --allow-blob-public-access true

            az storage blob service-properties update \
              --account-name stadmissionfrontend \
              --static-website \
              --index-document index.html \
              --404-document index.html
          else
            echo "Storage account already exists"
          fi

      - name: Upload frontend to Blob Storage
        run: |
          az storage blob upload-batch \
            --account-name stadmissionfrontend \
            --destination '$web' \
            --source frontend/ \
            --overwrite true

      - name: Get frontend URL
        run: |
          echo "Frontend URL: $(az storage account show \
            --name stadmissionfrontend \
            --resource-group ${{ secrets.TF_VAR_RESOURCE_GROUP_NAME }} \
            --query primaryEndpoints.web -o tsv)"